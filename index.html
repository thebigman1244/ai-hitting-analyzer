<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Hitting Analyzer</title>
  <style>
    body { background:#111; color:#eee; font-family:Arial; text-align:center; }
    video, canvas { width:700px; margin-top:10px; background:black; }
    button, input { padding:8px; margin-top:8px; }
    #results { margin-top:15px; font-size:18px; }
    #error { color:red; margin-top:10px; }
  </style>
</head>
<body>

<h2>AI Hitting Analyzer</h2>

<input type="file" id="videoInput" accept="video/*"><br>
<input type="number" id="contactTime" step="0.01" placeholder="Contact time (seconds)"><br>
<button onclick="jumpToContact()">Jump to Contact</button><br>

<video id="video" controls></video>
<canvas id="canvas"></canvas><br>

<button onclick="analyze()">Analyze</button>

<div id="results"></div>
<div id="error"></div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let platePoints = [];

document.getElementById("videoInput").addEventListener("change", function(e){
    const file = e.target.files[0];
    if (!file) return;
    video.src = URL.createObjectURL(file);
});

video.addEventListener("loadedmetadata", () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    drawFrame();
});

function drawFrame(){
    if(video.readyState >= 2){
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        platePoints.forEach(p=>{
            ctx.beginPath();
            ctx.arc(p[0], p[1], 8, 0, Math.PI*2);
            ctx.strokeStyle = "lime";
            ctx.lineWidth = 3;
            ctx.stroke();
        });
    }
}

canvas.addEventListener("click", function(e){
    if(platePoints.length >= 2){
        document.getElementById("error").innerText = "Plate already set. Refresh to reset.";
        return;
    }
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    platePoints.push([x,y]);
    drawFrame();
});

function jumpToContact(){
    const t = parseFloat(document.getElementById("contactTime").value);
    if(isNaN(t)){ alert("Enter valid contact time."); return; }
    video.currentTime = t;
    video.pause();
    setTimeout(drawFrame, 50);
}

async function analyze(){
    document.getElementById("error").innerText = "";
    document.getElementById("results").innerText = "";

    if(platePoints.length !== 2){
        document.getElementById("error").innerText = "Click 2 plate points first.";
        return;
    }

    const contact = document.getElementById("contactTime").value;
    if(contact === ""){
        document.getElementById("error").innerText = "Enter contact time.";
        return;
    }

    const file = document.getElementById("videoInput").files[0];
    if(!file){
        document.getElementById("error").innerText = "Upload a video.";
        return;
    }

    const form = new FormData();
    form.append("video", file);
    form.append("contact", contact);
    form.append("plate", JSON.stringify(platePoints));

    const response = await fetch("/analyze", {
        method: "POST",
        body: form
    });

    const text = await response.text();

    let data;
    try{
        data = JSON.parse(text);
    }catch{
        document.getElementById("error").innerText = "Server returned non-JSON response.";
        return;
    }

    if(data.error){
        document.getElementById("error").innerText = data.error;
        return;
    }

    document.getElementById("results").innerHTML =
        `Exit Velocity: <b>${data.exit_velocity_mph} mph</b><br>
         Launch Angle: <b>${data.launch_angle_deg}°</b><br>
         Air Distance: <b>${data.air_distance_ft} ft</b>`;
}
</script>

</body>
</html>
